name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main # O deploy acontecerá automaticamente sempre que houver um push na branch main

jobs:
  web-deploy:
    name: Build & Deploy to cPanel
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar Dependências
      run: npm install

    - name: Gerar Build (dist)
      run: npm run build

    - name: Realizar Deploy via SFTP (SSH)
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22
        local_path: './dist/*'
        remote_path: '/public_html/' # Se o seu site estiver em outra pasta, mude aqui.
        delete_remote_files: false
        ssh_private_key: '' # Deixe vazio se usar apenas senha
